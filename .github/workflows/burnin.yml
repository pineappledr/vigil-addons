name: "Burn-in Add-on: Build and Release"

on:
  push:
    branches: [ "**" ]
    tags:
      - 'v*'
    paths:
      - 'burn-in/**'
      - 'shared/**'
      - '.github/workflows/burnin.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'burn-in/**'
      - 'shared/**'
      - '.github/workflows/burnin.yml'

env:
  REGISTRY: ghcr.io
  HUB_IMAGE: ghcr.io/pineappledr/vigil-addons-burnin-hub
  AGENT_IMAGE: ghcr.io/pineappledr/vigil-addons-burnin-agent
  AGENT_IMAGE_DEBIAN: ghcr.io/pineappledr/vigil-addons-burnin-agent-debian
  GO_VERSION: '1.26.2'
  WORKDIR: burn-in

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # TEST JOB - Runs on every push/PR
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: burn-in
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: burn-in/go.sum

      - name: Install dependencies
        run: go mod tidy

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: burn-in/coverage.out
          retention-days: 7

      - name: Build check
        run: |
          go build -v ./cmd/hub
          go build -v ./cmd/agent

  # ─────────────────────────────────────────────────────────────────────────
  # SECURITY SCAN - Breaks the build on high/critical vulnerabilities
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: burn-in
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: burn-in/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity high -confidence high -quiet ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build hub image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.hub
          push: false
          load: true
          tags: burnin-hub:scan
          cache-from: type=gha

      - name: Build agent image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent
          push: false
          load: true
          tags: burnin-agent:scan
          cache-from: type=gha

      - name: Build agent Debian image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent-debian
          push: false
          load: true
          tags: burnin-agent-debian:scan
          cache-from: type=gha

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy scan - Hub image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed burnin-hub:scan

      - name: Trivy scan - Agent image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed burnin-agent:scan

      - name: Trivy scan - Agent Debian image
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed burnin-agent-debian:scan

  # ─────────────────────────────────────────────────────────────────────────
  # PR PREVIEW - Build preview images for pull requests
  # ─────────────────────────────────────────────────────────────────────────
  build-pr-preview:
    name: PR Preview
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Build Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.hub
          push: true
          build-args: VERSION=${{ steps.version.outputs.tag }}
          tags: ${{ env.HUB_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent
          push: true
          build-args: VERSION=${{ steps.version.outputs.tag }}
          tags: ${{ env.AGENT_IMAGE }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent (Debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent-debian
          push: true
          build-args: VERSION=${{ steps.version.outputs.tag }}
          tags: ${{ env.AGENT_IMAGE_DEBIAN }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🐳 Burn-in Preview Images Built!

            | Image | Pull Command |
            |-------|--------------|
            | Hub | \`docker pull ${{ env.HUB_IMAGE }}:${tag}\` |
            | Agent | \`docker pull ${{ env.AGENT_IMAGE }}:${tag}\` |

            These preview images can be used for testing before merging.`
            })

  # ─────────────────────────────────────────────────────────────────────────
  # DEV BUILD - Feature branches (not main, not tags)
  # ─────────────────────────────────────────────────────────────────────────
  build-dev:
    name: Dev Build
    needs: [test, security]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref != 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: burn-in

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: burn-in/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          BRANCH_TAG=$(echo "$BRANCH_NAME" | sed 's/\//-/g')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="dev-${BRANCH_TAG}-${SHORT_SHA}"

          echo "branch=$BRANCH_TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION="${{ steps.meta.outputs.version }}"
          LDFLAGS="-s -w -X main.version=$VERSION"

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-hub-linux-amd64 ./cmd/hub
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-hub-linux-arm64 ./cmd/hub
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-agent-linux-amd64 ./cmd/agent
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-agent-linux-arm64 ./cmd/agent

          cd dist && sha256sum * > checksums.txt

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: burnin-${{ steps.meta.outputs.version }}
          path: burn-in/dist/
          retention-days: 14

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.meta.outputs.branch }}
          name: "Dev: ${{ steps.meta.outputs.branch }}"
          body: |
            Dev build from `${{ steps.meta.outputs.branch }}` branch (commit ${{ github.sha }}).

            **Version:** `${{ steps.meta.outputs.version }}`
          files: |
            burn-in/dist/burnin-hub-linux-amd64
            burn-in/dist/burnin-hub-linux-arm64
            burn-in/dist/burnin-agent-linux-amd64
            burn-in/dist/burnin-agent-linux-arm64
            burn-in/dist/checksums.txt
          prerelease: true
          make_latest: false

      - name: Build Hub image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.hub
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.HUB_IMAGE }}:dev-${{ steps.meta.outputs.branch }}
            ${{ env.HUB_IMAGE }}:dev-${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.AGENT_IMAGE }}:dev-${{ steps.meta.outputs.branch }}
            ${{ env.AGENT_IMAGE }}:dev-${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent image (Debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent-debian
          push: true
          build-args: VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ env.AGENT_IMAGE_DEBIAN }}:dev-${{ steps.meta.outputs.branch }}
            ${{ env.AGENT_IMAGE_DEBIAN }}:dev-${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # LATEST BUILD - Main branch
  # ─────────────────────────────────────────────────────────────────────────
  build-latest:
    name: Latest Build
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: meta
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.hub
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=latest-${{ steps.meta.outputs.sha }}
          tags: |
            ${{ env.HUB_IMAGE }}:latest
            ${{ env.HUB_IMAGE }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=latest-${{ steps.meta.outputs.sha }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent (Debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent-debian
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=latest-${{ steps.meta.outputs.sha }}
          tags: |
            ${{ env.AGENT_IMAGE_DEBIAN }}:latest
            ${{ env.AGENT_IMAGE_DEBIAN }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # RELEASE - Version tags (v*)
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    needs: [test, security]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: burn-in

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=${{ contains(github.ref, '-') }}" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: burn-in/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Hub image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.hub
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.HUB_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.HUB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.AGENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agent image (Debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: burn-in/Dockerfile.agent-debian
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.AGENT_IMAGE_DEBIAN }}:${{ steps.version.outputs.version }}
            ${{ env.AGENT_IMAGE_DEBIAN }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.version }}"
          LDFLAGS="-s -w -X main.version=$VERSION"

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-hub-linux-amd64 ./cmd/hub
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-hub-linux-arm64 ./cmd/hub
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-agent-linux-amd64 ./cmd/agent
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o dist/burnin-agent-linux-arm64 ./cmd/agent

          cd dist && sha256sum * > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "changes=Initial release" >> $GITHUB_OUTPUT
          else
            CHANGES=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD)
            echo "changes<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Burn-in Add-on v${{ steps.version.outputs.version }}
          body: |
            ## Burn-in & Pre-clear Add-on v${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ---

            ### 🐳 Docker Images

            | Image | Command |
            |-------|---------|
            | Hub | `docker pull ${{ env.HUB_IMAGE }}:${{ steps.version.outputs.version }}` |
            | Agent | `docker pull ${{ env.AGENT_IMAGE }}:${{ steps.version.outputs.version }}` |

            **Multi-Architecture:** Both images support `linux/amd64` and `linux/arm64`.

            ---

            ### 📦 Binaries

            ```bash
            VERSION=${{ steps.version.outputs.version }}

            # Hub (AMD64)
            curl -sL https://github.com/${{ github.repository }}/releases/retrieve/v${VERSION}/burnin-hub-linux-amd64 -o burnin-hub
            chmod +x burnin-hub

            # Hub (ARM64)
            curl -sL https://github.com/${{ github.repository }}/releases/retrieve/v${VERSION}/burnin-hub-linux-arm64 -o burnin-hub
            chmod +x burnin-hub

            # Agent (AMD64)
            curl -sL https://github.com/${{ github.repository }}/releases/retrieve/v${VERSION}/burnin-agent-linux-amd64 -o burnin-agent
            chmod +x burnin-agent

            # Agent (ARM64)
            curl -sL https://github.com/${{ github.repository }}/releases/retrieve/v${VERSION}/burnin-agent-linux-arm64 -o burnin-agent
            chmod +x burnin-agent
            ```

            ### ✅ Verify Checksums

            ```bash
            curl -sL https://github.com/${{ github.repository }}/releases/retrieve/v${VERSION}/checksums.txt | sha256sum -c
            ```
          files: |
            burn-in/dist/burnin-hub-linux-amd64
            burn-in/dist/burnin-hub-linux-arm64
            burn-in/dist/burnin-agent-linux-amd64
            burn-in/dist/burnin-agent-linux-arm64
            burn-in/dist/checksums.txt
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          make_latest: true
