# SnapRAID Add-on for Vigil
#
# ──────────────────────────────────────────────────────────────────────
#  ONE-TIME SETUP (required before `docker compose up`)
# ──────────────────────────────────────────────────────────────────────
#
#   1. Copy the Hub example config and set the two required fields:
#
#        cp config.hub.example.yaml config.hub.yaml
#
#      Then edit config.hub.yaml and fill in:
#        vigil.server_url : URL of your Vigil Server   (e.g. http://vigil.local:9080)
#        vigil.token      : add-on registration token  (Vigil UI → Add-ons → Add Add-on)
#        vigil.server_pubkey : base64 Ed25519 key      (shown in the Add Add-on dialog)
#
#      The Hub REQUIRES a config file — it will not start without one.
#      Environment variables (VIGIL_URL, VIGIL_TOKEN, VIGIL_SERVER_PUBKEY,
#      VIGIL_SNAPRAID_HUB_*) can override any field, but the file itself
#      must exist at the mounted path.
#
#   2. Make sure /etc/snapraid.conf exists on the Agent host and
#      `snapraid status` works there (apt install snapraid).
#
#   3. Start the Hub first so it can register with Vigil and generate
#      its agent PSK, then start the Agent:
#
#        docker compose up -d snapraid-hub
#        docker exec snapraid-hub cat /data/hub.psk   # copy this value
#        # paste into VIGIL_SNAPRAID_AGENT_HUB_PSK below, then:
#        docker compose up -d snapraid-agent
#
#      (Or use the Vigil UI → SnapRAID → Agents → "Add SnapRAID Agent"
#      deploy wizard, which pre-fills the PSK for you.)
#
# ──────────────────────────────────────────────────────────────────────

services:
  snapraid-hub:
    container_name: Snapraid-Hub
    image: ghcr.io/pineappledr/vigil-addons-snapraid-hub:latest
    restart: unless-stopped
    ports:
      - "9300:9300"
    command: ["-config", "/etc/snapraid-hub/config.hub.yaml"]
    volumes:
      # Persistent Hub state: agent registry + generated hub.psk
      - hub-data:/data
      # REQUIRED — created in step 1 above
      - ./config.hub.yaml:/etc/snapraid-hub/config.hub.yaml:ro

  snapraid-agent:
    container_name: Snapraid-Agent
    image: ghcr.io/pineappledr/vigil-addons-snapraid-agent:latest
    restart: unless-stopped
    privileged: true
    ports:
      - "9400:9400"
    # The Agent runs on environment variables only — no YAML file required.
    # (A config.agent.yaml mount is also supported; see README → Configuration.)
    environment:
      VIGIL_SNAPRAID_AGENT_HUB_URL: http://snapraid-hub:9300
      VIGIL_SNAPRAID_AGENT_HUB_PSK: "paste-from-docker-exec-Snapraid-Hub-cat-data-hub.psk"
      VIGIL_SNAPRAID_AGENT_ID: snapraid-agent-01
      VIGIL_SNAPRAID_AGENT_ADVERTISE_ADDR: http://snapraid-agent:9400
      VIGIL_SNAPRAID_AGENT_LISTEN_PORT: 9400
      VIGIL_SNAPRAID_AGENT_SNAPRAID_CONFIG_PATH: /etc/snapraid.conf
      TZ: ${TZ:-UTC}
    volumes:
      - agent-data:/var/lib/vigil-snapraid-agent
      - /dev:/dev:ro
      - /etc/snapraid.conf:/etc/snapraid.conf:ro

      # ─── Content file directory — mount the DIRECTORY, never the file ───
      # ─── (direct file mounts cause EBUSY on rename during sync/scrub) ───
      # - /var/snapraid:/var/snapraid

      # ─── Parity disks — read-write (written by sync) ───
      # - /mnt/parity:/mnt/parity

      # ─── Data disks — read-write (needed for touch/fix) ───
      # - /mnt/data1:/mnt/data1
      # - /mnt/data2:/mnt/data2

      # ─── Docker socket — uncomment if using container pause/stop during sync ───
      # - /var/run/docker.sock:/var/run/docker.sock

      # ─── Hook scripts (optional) ───
      # - ./scripts/pre-sync.sh:/usr/local/bin/pre-sync.sh:ro
      # - ./scripts/post-sync.sh:/usr/local/bin/post-sync.sh:ro

volumes:
  hub-data:
  agent-data:
