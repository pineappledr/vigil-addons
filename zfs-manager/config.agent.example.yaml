# ZFS Agent Configuration
# ───────────────────────────────────────────────────────────────────────
# The Agent runs on each ZFS host. It executes zpool/zfs CLI commands
# and streams telemetry to the Manager.
#
# All values can be overridden via environment variables prefixed with
# VIGIL_ZFS_AGENT_ (e.g., VIGIL_ZFS_AGENT_LISTEN_PORT=9600).
#
# The Agent can run without a YAML file — starts with defaults and
# applies environment variable overrides.
# ───────────────────────────────────────────────────────────────────────

# ── Listener ─────────────────────────────────────────────────────────
listen:
  port: 9600

# ── Manager Connection ──────────────────────────────────────────────
hub:
  url: "http://zfs-manager:9500"

  # Pre-shared key for authenticating with the Manager.
  # Auto-generated by the Manager on first boot.
  # Shown in the deploy-wizard UI or: docker exec zfs-manager cat /data/hub.psk
  psk: ""

# ── Identity ────────────────────────────────────────────────────────
identity:
  # Human-readable name shown in the Manager UI. Defaults to hostname.
  agent_id: ""

  # URL where the Manager can reach this agent (host LAN IP + port).
  # Required for Docker deployments.
  # Example: http://192.168.1.100:9600
  advertise_addr: ""

# ── ZFS Paths ────────────────────────────────────────────────────────
zfs:
  # Paths to zpool and zfs binaries. Leave empty to auto-detect from PATH.
  zpool_path: ""
  zfs_path: ""

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level: "info"
